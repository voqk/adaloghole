; AdalogHole firmware — ESP32-S3 camera board (e.g. Seeed XIAO ESP32-S3 Sense).
; STUB: board + deps sketched out; nothing wired up yet.

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

; PSRAM is required to build the request body + hold the JPEG.
board_build.arduino.memory_type = qio_opi
build_flags =
	-DBOARD_HAS_PSRAM

