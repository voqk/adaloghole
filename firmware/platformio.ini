; AdalogHole firmware — ESP32-S3 camera board (Seeed XIAO ESP32-S3 Sense).

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

; PSRAM is required to build the request body + hold the JPEG.
board_build.arduino.memory_type = qio_opi
build_flags =
	-DBOARD_HAS_PSRAM

; Stage 1 core loop: only ArduinoJson (parse the server's JSON reply).
; esp32-camera ships with the Arduino-ESP32 core. IRremoteESP8266 and a display
; lib (LovyanGFX / TFT_eSPI) get added with their own plans once that hardware
; arrives — see docs/stage1-core-loop-plan.md "Out of scope".
lib_deps =
	bblanchon/ArduinoJson
